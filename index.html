<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sit" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Sit</title>
  <style>
    :root {
      --bg: #0d0f12;
      --fg: #e8e6e0;
      --muted: #6b7280;
      --accent: #c9a86a;      /* warm brass, like the bowl */
      --surface: #171a1f;
      --surface-2: #1f242b;
      --danger: #7a5a4a;
      --tap: 72px;            /* min touch target */
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
      user-select: none;
    }

    /* screens share the same centered column */
    .screen {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      text-align: center;
    }
    .screen.active { display: flex; }

    h1.brand {
      position: absolute;
      top: max(20px, env(safe-area-inset-top));
      left: 0; right: 0;
      margin: 0;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ---- setup ---- */
    .field { width: 100%; max-width: 360px; }
    .field-label {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .chip {
      flex: 1 1 auto;
      min-width: 64px;
      min-height: 54px;
      padding: 0 14px;
      border: 1px solid var(--surface-2);
      background: var(--surface);
      color: var(--fg);
      border-radius: 14px;
      font-size: 17px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .chip.selected {
      border-color: var(--accent);
      background: var(--surface-2);
      color: var(--accent);
    }
    .chip.custom { display: flex; align-items: center; gap: 6px; }
    .chip.custom input {
      width: 48px;
      background: transparent;
      border: none;
      color: inherit;
      font-size: 17px;
      text-align: right;
      -moz-appearance: textfield;
    }
    .chip.custom input::-webkit-outer-spin-button,
    .chip.custom input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    /* ---- the big time display ---- */
    .time {
      font-size: clamp(64px, 22vw, 128px);
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      line-height: 1;
    }
    .phase-label {
      font-size: 14px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      min-height: 18px;
    }

    /* breathing ring behind the time during a sit */
    .ring {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ring::before {
      content: "";
      position: absolute;
      width: 260px; height: 260px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,106,0.14);
      animation: breathe 8s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(0.82); opacity: 0.5; }
      50%      { transform: scale(1.0);  opacity: 1;   }
    }
    @media (prefers-reduced-motion: reduce) {
      .ring::before { animation: none; }
    }

    /* ---- buttons ---- */
    .controls {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 360px;
    }
    button.primary, button.secondary {
      cursor: pointer;
      border-radius: 100px;
      font-size: 18px;
      font-weight: 500;
      transition: transform .08s, background .15s, border-color .15s;
    }
    button.primary:active, button.secondary:active { transform: scale(0.97); }

    button.primary {
      min-height: var(--tap);
      padding: 0 40px;
      background: var(--accent);
      color: #17130a;
      border: none;
      flex: 1;
    }
    button.secondary {
      min-height: var(--tap);
      min-width: var(--tap);
      padding: 0 28px;
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--surface-2);
      flex: 1;
    }
    button.secondary.end { color: var(--muted); }

    .hint {
      font-size: 13px;
      color: var(--muted);
      max-width: 300px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1 class="brand">Sit</h1>

  <!-- SETUP -->
  <section id="setup" class="screen active">
    <div class="field">
      <div class="field-label">Duration</div>
      <div class="chips" id="durationChips">
        <button class="chip" data-min="5">5</button>
        <button class="chip selected" data-min="10">10</button>
        <button class="chip" data-min="15">15</button>
        <button class="chip" data-min="20">20</button>
        <button class="chip" data-min="30">30</button>
        <label class="chip custom">
          <input id="customMin" type="number" min="1" max="180" inputmode="numeric" placeholder="•" />
          <span>min</span>
        </label>
      </div>
    </div>

    <div class="field">
      <div class="field-label">Settle first</div>
      <div class="chips" id="prerollChips">
        <button class="chip" data-sec="0">None</button>
        <button class="chip" data-sec="5">5s</button>
        <button class="chip selected" data-sec="7">7s</button>
        <button class="chip" data-sec="10">10s</button>
      </div>
    </div>

    <div class="controls">
      <button class="primary" id="startBtn">Begin</button>
    </div>
  </section>

  <!-- RUNNING (also used for pre-roll) -->
  <section id="running" class="screen">
    <div class="ring">
      <div>
        <div class="phase-label" id="phaseLabel">Settle in</div>
        <div class="time" id="timeDisplay">10:00</div>
      </div>
    </div>
    <div class="controls">
      <button class="secondary" id="pauseBtn">Pause</button>
      <button class="secondary end" id="endBtn">End</button>
    </div>
  </section>

  <!-- FINISHED -->
  <section id="finished" class="screen">
    <div>
      <div class="phase-label" id="finishedLabel">Complete</div>
      <div class="time" style="font-size: clamp(40px,14vw,76px); font-weight:300;" id="finishedTime">10:00</div>
    </div>
    <div class="controls">
      <button class="primary" id="againBtn">Sit again</button>
    </div>
    <div class="hint">Nicely done.</div>
  </section>

  <!-- TEMP: audio status readout for on-device diagnosis -->
  <div id="adbg" style="position:fixed;left:0;right:0;bottom:4px;text-align:center;font-size:11px;color:#7a828c;font-family:monospace;"></div>

  <script>
  (() => {
    "use strict";

    const BELL_URL = "audio/535950__mttvn__e-flat-tibetan-singing-bowl-struck.wav";

    // ---------- element refs ----------
    const screens = {
      setup: document.getElementById("setup"),
      running: document.getElementById("running"),
      finished: document.getElementById("finished"),
    };
    const durationChips = document.getElementById("durationChips");
    const prerollChips = document.getElementById("prerollChips");
    const customMin = document.getElementById("customMin");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const endBtn = document.getElementById("endBtn");
    const againBtn = document.getElementById("againBtn");
    const timeDisplay = document.getElementById("timeDisplay");
    const phaseLabel = document.getElementById("phaseLabel");
    const finishedTime = document.getElementById("finishedTime");
    const finishedLabel = document.getElementById("finishedLabel");

    // ---------- persisted settings ----------
    const store = {
      get(k, d) { try { const v = localStorage.getItem(k); return v === null ? d : v; } catch { return d; } },
      set(k, v) { try { localStorage.setItem(k, v); } catch {} },
    };

    let durationMin = Number(store.get("durationMin", 10));
    let prerollSec = Number(store.get("prerollSec", 7));

    // ---------- audio (Web Audio) ----------
    // iOS Safari only lets Web Audio make sound if it is unlocked SYNCHRONOUSLY
    // inside a tap: resume() + play a source, with NO await before it. So we
    // unlock in the click handler (unlockAudio) and pre-decode the bell at load,
    // keeping the tap path synchronous. Desktop doesn't need this, but it's
    // harmless there.
    let audioCtx = null;
    let bellBuffer = null;
    let bellLoading = null;
    let audioUnlocked = false;

    function makeCtx() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AC();
      }
      return audioCtx;
    }

    // MUST be called synchronously from inside a user gesture. No await before it.
    function unlockAudio() {
      makeCtx();
      if (audioCtx.state === "suspended") audioCtx.resume();
      if (!audioUnlocked) {
        // a 1-sample silent buffer played in-gesture is the canonical iOS unlock
        const b = audioCtx.createBuffer(1, 1, 22050);
        const s = audioCtx.createBufferSource();
        s.buffer = b;
        s.connect(audioCtx.destination);
        s.start(0);
        audioUnlocked = true;
      }
      updateAudioDbg();
    }

    // Load + decode the bell. Safe to start at page load (decode works on a
    // suspended context), so the buffer is ready before the first tap.
    function ensureAudio() {
      makeCtx();
      if (audioCtx.state === "suspended") audioCtx.resume();
      if (!bellBuffer && !bellLoading) {
        bellLoading = fetch(BELL_URL)
          .then(r => r.arrayBuffer())
          .then(buf => new Promise((res, rej) => audioCtx.decodeAudioData(buf, res, rej)))
          .then(b => { bellBuffer = b; updateAudioDbg(); })
          .catch(err => { console.warn("bell load failed", err); updateAudioDbg(); });
      }
      return bellLoading || Promise.resolve();
    }

    function updateAudioDbg() {
      const el = document.getElementById("adbg");
      if (el) el.textContent = "audio: ctx=" + (audioCtx ? audioCtx.state : "none") +
        " · unlocked=" + audioUnlocked + " · bell=" + (bellBuffer ? "ready" : "loading");
    }

    // Bells are scheduled on the Web Audio clock, not on JS timers. The audio
    // thread keeps its own time and fires scheduled sources even while the
    // display loop is throttled (tab hidden / screen off), and it carries the
    // Start-tap gesture permission forward to bells that ring seconds later.
    let scheduledBells = [];

    // schedule a bell at an absolute AudioContext time; past times ring now.
    // returns the source node so a still-pending bell can be cancelled.
    function scheduleBell(ctxTime) {
      if (!audioCtx || !bellBuffer) return null;
      if (audioCtx.state === "suspended") audioCtx.resume();
      const src = audioCtx.createBufferSource();
      src.buffer = bellBuffer;
      src.connect(audioCtx.destination);
      src.start(Math.max(audioCtx.currentTime, ctxTime));
      scheduledBells.push(src);
      src.onended = () => { scheduledBells = scheduledBells.filter(s => s !== src); };
      return src;
    }

    function ringBellNow() {
      return scheduleBell(audioCtx ? audioCtx.currentTime : 0);
    }

    function cancelBell(src) {
      if (!src) return;
      try { src.stop(); } catch {}
      scheduledBells = scheduledBells.filter(s => s !== src);
    }

    function cancelAllBells() {
      for (const s of scheduledBells.slice()) { try { s.stop(); } catch {} }
      scheduledBells = [];
    }

    // ---------- wake lock ----------
    let wakeLock = null;
    async function acquireWakeLock() {
      try {
        if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen");
      } catch {}
    }
    function releaseWakeLock() {
      try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch {}
    }
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" &&
          (state.phase === "preroll" || state.phase === "running")) {
        acquireWakeLock();
        startLoop();   // display loop may have stalled while hidden; resume + catch up
      }
    });

    // ---------- state machine ----------
    // phases: idle | preroll | running | paused | finished
    const state = {
      phase: "idle",
      endAt: 0,          // absolute ms when current phase ends
      remainingMs: 0,    // used while paused
      sessionMs: 0,      // total meditation length (excludes preroll)
      endBellSrc: null,  // scheduled end-bell source (for cancel on pause/end)
      timer: null,       // setInterval id for the display loop
    };

    function show(name) {
      for (const k in screens) screens[k].classList.toggle("active", k === name);
    }

    function fmt(ms) {
      const total = Math.max(0, Math.ceil(ms / 1000));
      const m = Math.floor(total / 60);
      const s = total % 60;
      return m + ":" + String(s).padStart(2, "0");
    }

    // Display loop only. Uses setInterval, not requestAnimationFrame: rAF stops
    // completely when the page isn't rendering, whereas setInterval keeps firing
    // (throttled) in the background. The bells don't depend on this loop at all.
    function tickOnce() {
      const now = Date.now();
      const remaining = state.endAt - now;
      if (state.phase === "preroll") {
        timeDisplay.textContent = fmt(remaining);
        if (remaining <= 0) beginSession();
      } else if (state.phase === "running") {
        timeDisplay.textContent = fmt(remaining);
        if (remaining <= 0) finishSession(false);
      }
      updateAudioDbg();   // keep the on-device audio readout live
    }

    function startLoop() {
      stopLoop();
      tickOnce();
      state.timer = setInterval(tickOnce, 250);
    }
    function stopLoop() {
      if (state.timer) { clearInterval(state.timer); state.timer = null; }
    }

    // ---- transitions ----
    // The Start tap schedules BOTH bells on the audio clock up front, so they
    // fire on time regardless of what the display loop does afterwards.
    async function begin() {
      await ensureAudio();               // unlock ctx + finish loading/decoding bell
      acquireWakeLock();
      state.sessionMs = durationMin * 60 * 1000;
      const sessionSec = state.sessionMs / 1000;
      const at = audioCtx ? audioCtx.currentTime : 0;
      const now = Date.now();
      show("running");

      if (prerollSec > 0) {
        state.phase = "preroll";
        state.endAt = now + prerollSec * 1000;
        scheduleBell(at + prerollSec);                              // start bell
        state.endBellSrc = scheduleBell(at + prerollSec + sessionSec); // end bell
        phaseLabel.textContent = "Settle in";
        pauseBtn.style.display = "none";   // no pausing the settle countdown; keep End centered
        timeDisplay.textContent = fmt(prerollSec * 1000);
        startLoop();
      } else {
        state.phase = "running";
        state.endAt = now + state.sessionMs;
        ringBellNow();                                              // start bell now
        state.endBellSrc = scheduleBell(at + sessionSec);          // end bell
        phaseLabel.textContent = "";
        pauseBtn.style.display = "";
        pauseBtn.textContent = "Pause";
        timeDisplay.textContent = fmt(state.sessionMs);
        startLoop();
      }
    }

    // UI-only transition from preroll to the sit (bells already scheduled).
    function beginSession() {
      state.phase = "running";
      state.endAt = state.endAt + state.sessionMs;  // preroll-end + session length
      phaseLabel.textContent = "";
      pauseBtn.style.display = "";
      pauseBtn.textContent = "Pause";
      timeDisplay.textContent = fmt(Math.max(0, state.endAt - Date.now()));
      startLoop();
    }

    function pause() {
      if (state.phase !== "running") return;
      state.remainingMs = Math.max(0, state.endAt - Date.now());
      cancelBell(state.endBellSrc);        // pull the scheduled end bell
      state.endBellSrc = null;
      state.phase = "paused";
      stopLoop();
      pauseBtn.textContent = "Resume";
      phaseLabel.textContent = "Paused";
      releaseWakeLock();
    }

    function resume() {
      if (state.phase !== "paused") return;
      state.phase = "running";
      state.endAt = Date.now() + state.remainingMs;   // recompute fresh end
      if (audioCtx) {
        state.endBellSrc = scheduleBell(audioCtx.currentTime + state.remainingMs / 1000);
      }
      pauseBtn.textContent = "Pause";
      phaseLabel.textContent = "";
      acquireWakeLock();
      startLoop();
    }

    // early = user tapped End; natural = display loop reached zero.
    function finishSession(early) {
      stopLoop();
      releaseWakeLock();
      const remaining = state.phase === "paused"
        ? state.remainingMs
        : Math.max(0, state.endAt - Date.now());
      if (early) {
        cancelBell(state.endBellSrc);      // cancel the future end bell...
        state.endBellSrc = null;
        ringBellNow();                     // ...and ring a clean close now
      }
      // natural end: the scheduled end bell already rang — don't double-ring
      state.endBellSrc = null;
      state.phase = "finished";
      finishedLabel.textContent = early ? "Ended" : "Complete";
      const satMs = early ? Math.max(0, state.sessionMs - remaining) : state.sessionMs;
      finishedTime.textContent = fmt(satMs);
      show("finished");
    }

    function reset() {
      stopLoop();
      releaseWakeLock();
      cancelAllBells();          // clears both start + end bells if any are pending
      state.endBellSrc = null;
      state.phase = "idle";
      show("setup");
    }

    // ---------- setup UI wiring ----------
    function selectChip(container, el) {
      [...container.querySelectorAll(".chip")].forEach(c => c.classList.remove("selected"));
      if (el) el.classList.add("selected");
    }

    // reflect persisted duration on load
    (function initDuration() {
      const preset = durationChips.querySelector(`.chip[data-min="${durationMin}"]`);
      if (preset) { selectChip(durationChips, preset); }
      else { selectChip(durationChips, null); customMin.value = durationMin; }
    })();
    (function initPreroll() {
      const p = prerollChips.querySelector(`.chip[data-sec="${prerollSec}"]`);
      if (p) selectChip(prerollChips, p);
    })();

    durationChips.addEventListener("click", (e) => {
      const chip = e.target.closest(".chip[data-min]");
      if (!chip) return;
      durationMin = Number(chip.dataset.min);
      customMin.value = "";
      selectChip(durationChips, chip);
      store.set("durationMin", durationMin);
    });

    customMin.addEventListener("input", () => {
      const v = Math.min(180, Math.max(1, Number(customMin.value) || 0));
      if (v >= 1) {
        durationMin = v;
        selectChip(durationChips, customMin.closest(".chip"));
        store.set("durationMin", durationMin);
      }
    });

    prerollChips.addEventListener("click", (e) => {
      const chip = e.target.closest(".chip[data-sec]");
      if (!chip) return;
      prerollSec = Number(chip.dataset.sec);
      selectChip(prerollChips, chip);
      store.set("prerollSec", prerollSec);
    });

    // ---------- control wiring ----------
    // unlockAudio() runs FIRST and synchronously — it must be inside the tap,
    // before begin()'s awaits, or iOS keeps the audio muted.
    startBtn.addEventListener("click", () => { unlockAudio(); begin(); });
    againBtn.addEventListener("click", reset);
    pauseBtn.addEventListener("click", () => {
      if (state.phase === "running") pause();
      else if (state.phase === "paused") { unlockAudio(); resume(); }
    });
    endBtn.addEventListener("click", () => {
      if (state.phase === "preroll") reset();   // abort the settle countdown, no bell
      else if (state.phase === "running" || state.phase === "paused") finishSession(true);
    });

    // Pre-decode the bell at load so the buffer is ready before the first tap.
    ensureAudio();
    updateAudioDbg();

    // ---------- service worker ----------
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  })();
  </script>
</body>
</html>
